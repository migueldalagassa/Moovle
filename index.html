<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOOVLE TV</title>
    
    <link rel="icon" type="image/png" href="FaviconMoovleTV.png">
    <link rel="apple-touch-icon" href="FaviconMoovleTV.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.reload()">MOOVLE<span style="color: #0062ff;">TV</span></div>
        <div class="header-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="O que vamos assistir hoje?" oninput="handleSearchInput(this.value)">
                <div id="searchSuggestions" class="search-suggestions"></div>
            </div>
        </div>
        <div class="header-right">
            <div id="login-container">
                <div id="g_id_onload" 
                     data-client_id="YOUR_GOOGLE_CLIENT_ID" 
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
            </div>
            
            <div id="user-profile" style="display: none; align-items: center; gap: 10px;">
                <span id="user-name" style="color: white; font-weight: 600;"></span>
                <img id="user-pic" src="" alt="User" style="width: 35px; height: 35px; border-radius: 50%; border: 2px solid #0062ff;">
            </div>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <nav class="nav-menu">
                <div class="nav-item active" title="Início" onclick="filterType('all', this)"><i class="fas fa-home"></i></div>
                <div class="nav-item" title="Filmes" onclick="filterType('movie', this)"><i class="fas fa-film"></i></div>
                <div class="nav-item" title="Séries" onclick="filterType('tv', this)"><i class="fas fa-tv"></i></div>
                <div class="nav-item" id="fav-menu" title="Minha Lista" onclick="showFavorites(this)"><i class="fas fa-star"></i></div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="category-pills">
                <button class="pill active" onclick="filterGenre('', this)">Todos</button>
                <button class="pill" onclick="filterGenre('28', this)">Ação</button>
                <button class="pill" onclick="filterGenre('16', this)">Animes</button>
                <button class="pill" onclick="filterGenre('27', this)">Terror</button>
                <button class="pill" onclick="filterGenre('878', this)">Ficção</button>
            </div>
            <section class="shelf">
                <h2 class="section-title" id="shelfTitle">RECOMENDADOS PARA VOCÊ</h2>
                <br>
                <div id="mainGrid" class="movie-grid"></div>
            </section>
        </main>
    </div>

    <div id="playerModal" class="modal-overlay" style="display: none;">
        <div class="player-container-rect">
            <div class="player-top-bar">
                <div class="top-left">
                    <button class="back-btn-player" onclick="closePlayer()"><i class="fas fa-chevron-left"></i> VOLTAR</button>
                    <h3 id="movieTitleDisplay">NOME DO CONTEÚDO</h3>
                    <button id="modalFavBtn" class="modal-fav-btn" onclick="toggleFavorite()">
                        <i class="fas fa-star"></i>
                    </button>
                </div>
                <div class="quality-badge">4K FULL HD</div>
            </div>
            <div class="video-wrapper">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="source-selector">
                <span class="source-label">Fontes:</span>
                <button class="source-btn active" onclick="changeSource('vidsrc', this)">VIDSRC</button>
                <button class="source-btn" onclick="changeSource('superembed', this)">SUPEREMBED</button>
                <button class="source-btn" onclick="changeSource('embedvip', this)">EMBEDVIP</button>
            </div>
            <div id="ad-banner-container" style="text-align: center; padding: 10px; background: #0f172a;"></div>
        </div>
    </div>

    <script src="https://pl29054234.profitablecpmratenetwork.com/f3/68/d7/f368d7ccb3a5c2e4f5d6ebdd7f4c3ecc.js"></script>

    <script src="script.js"></script>
</body>
</html>
