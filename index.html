<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script async src="https://pl29054234.profitablecpmratenetwork.com/f3/68/d7/f368d7ccb3a5c2e4f5d6ebdd7f4c3ecc.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="origin-when-cross-origin">
    <meta name="google-site-verification" content="IE4PyfuJtRSZdf_2syrrsT1UrT2vBdzkdRTVCK92Nqo" />

    <title>MoovleTV - Filmes e Séries Online Grátis</title>
    
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.reload()">MOOVLE<span>TV</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar..." oninput="handleSearchInput(this.value)">
            <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="nav-menu">
            <div class="nav-item active" onclick="filterType('all', this)"><i class="fas fa-home"></i><span>Início</span></div>
            <div class="nav-item" onclick="filterType('movie', this)"><i class="fas fa-film"></i><span>Filmes</span></div>
            <div class="nav-item" onclick="filterType('tv', this)"><i class="fas fa-tv"></i><span>Séries</span></div>
            <div class="nav-item" onclick="showFavorites(this)"><i class="fas fa-star"></i><span>Favoritos</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="category-pills">
            <button class="pill active" onclick="filterGenre('', this)">Todos</button>
            <button class="pill" onclick="filterGenre('28', this)">Ação</button>
            <button class="pill" onclick="filterGenre('anime', this)">Animes</button> 
            <button class="pill" onclick="filterGenre('10751', this)">Infantil</button>
            <button class="pill" onclick="filterGenre('27', this)">Terror</button>
            <button class="pill" onclick="filterGenre('878', this)">Ficção</button>
        </div>
        <h2 class="section-title" id="shelfTitle">RECOMENDADOS</h2>
        <div id="mainGrid" class="movie-grid"></div>
        
        <div class="load-more-container">
            <button id="loadMoreBtn" onclick="loadMovies(true)">CARREGAR MAIS</button>
        </div>
    </main>

    <div id="playerModal" class="modal-overlay" style="display: none;">
    <div class="player-card-premium">
        <div class="player-header">
            <div class="header-left">
                <button class="back-btn-circle" onclick="closePlayer()" title="Fechar">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="title-info">
                    <h3 id="movieTitleDisplay">CARREGANDO...</h3>
                    <span class="streaming-tag">FULL HD</span>
                </div>
            </div>
            <button id="modalFavBtn" class="fav-btn-premium" onclick="toggleFavorite()">
                <i class="fas fa-star"></i>
            </button>
        </div>

        <div class="adblock-alert">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Se o vídeo não carregar ou der erro de conexão, desative o Adblock.</span>
        </div>

        <div class="video-wrapper">
            <div class="ads-notice-premium">
                <i class="fas fa-info-circle"></i> Feche os anúncios para liberar o vídeo
            </div>
            <div class="video-container-premium">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen 
                    allow="autoplay; encrypted-media">
                </iframe>
            </div>
        </div>
        
        <div class="player-footer">
            <p id="movieDescription" style="color: #ccc; font-size: 0.9rem; margin-top: 15px;"></p>
        </div>
    </div>
</div>
    
    <script src="script.js"></script>
</body>
</html>
