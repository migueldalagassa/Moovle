<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://pl29054234.profitablecpmratenetwork.com/f3/68/d7/f368d7ccb3a5c2e4f5d6ebdd7f4c3ecc.js"></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MoovleTV - Filmes e Séries Online Grátis</title>

    <meta name="google-site-verification" content="googleaa9c686492b92223" />

    <meta name="description" content="Assista filmes e séries online no MoovleTV. O melhor streaming gratuito.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.reload()">MOOVLE<span>TV</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar..." oninput="handleSearchInput(this.value)">
            <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="nav-menu">
            <div class="nav-item active" onclick="filterType('all', this)"><i class="fas fa-home"></i><span>Início</span></div>
            <div class="nav-item" onclick="filterType('movie', this)"><i class="fas fa-film"></i><span>Filmes</span></div>
            <div class="nav-item" onclick="filterType('tv', this)"><i class="fas fa-tv"></i><span>Séries</span></div>
            <div class="nav-item" onclick="showFavorites(this)"><i class="fas fa-star"></i><span>Favoritos</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="category-pills">
            <button class="pill active" onclick="filterGenre('', this)">Todos</button>
            <button class="pill" onclick="filterGenre('28', this)">Ação</button>
            <button class="pill" onclick="filterGenre('16', this)">Animes</button>
            <button class="pill" onclick="filterGenre('27', this)">Terror</button>
            <button class="pill" onclick="filterGenre('878', this)">Ficção</button>
        </div>
        <h2 class="section-title" id="shelfTitle">RECOMENDADOS</h2>
        <div id="mainGrid" class="movie-grid"></div>
    </main>

    <div id="playerModal" class="modal-overlay" style="display: none;">
        <div class="player-card-rect">
            <div class="player-header">
                <div class="header-left">
                    <button class="back-btn" onclick="closePlayer()"><i class="fas fa-times"></i></button>
                    <h3 id="movieTitleDisplay">CARREGANDO...</h3>
                </div>
                <button id="modalFavBtn" class="fav-btn-modal" onclick="toggleFavorite()"><i class="fas fa-star"></i></button>
            </div>
            <div class="ads-notice"><i class="fas fa-info-circle"></i> FECHE OS ANÚNCIOS PARA LIBERAR O VÍDEO</div>
            <div class="video-container-rect">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin"></iframe>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
