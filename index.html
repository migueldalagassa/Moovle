<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://pl29054234.profitablecpmratenetwork.com/f3/68/d7/f368d7ccb3a5c2e4f5d6ebdd7f4c3ecc.js"></script>

    <meta name="google-site-verification" content="IE4PyfuJtRSZdf_2syrrsT1UrT2vBdzkdRTVCK92Nqo" />
    <meta name="description" content="Assista aos melhores filmes e séries online no MoovleTV. O melhor catálogo de streaming gratuito com qualidade HD e lançamentos.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MoovleTV - Assistir Filmes e Séries Online Grátis HD</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.reload()">MOOVLE<span>TV</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar filmes ou séries..." oninput="handleSearchInput(this.value)">
            <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="nav-menu">
            <div class="nav-item active" onclick="filterType('all', this)"><i class="fas fa-home"></i><span>Início</span></div>
            <div class="nav-item" onclick="filterType('movie', this)"><i class="fas fa-film"></i><span>Filmes</span></div>
            <div class="nav-item" onclick="filterType('tv', this)"><i class="fas fa-tv"></i><span>Séries</span></div>
            <div class="nav-item" onclick="showFavorites(this)"><i class="fas fa-star"></i><span>Favoritos</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="category-pills">
            <button class="pill active" onclick="filterGenre('', this)">Todos</button>
            <button class="pill" onclick="filterGenre('28', this)">Ação</button>
            <button class="pill" onclick="filterGenre('anime', this)">Animes</button> 
            <button class="pill" onclick="filterGenre('10751', this)">Infantil</button>
            <button class="pill" onclick="filterGenre('27', this)">Terror</button>
            <button class="pill" onclick="filterGenre('878', this)">Ficção</button>
        </div>
        <h2 class="section-title" id="shelfTitle">RECOMENDADOS</h2>
        <div id="mainGrid" class="movie-grid"></div>
        
        <div class="load-more-container">
            <button id="loadMoreBtn" onclick="loadMovies(true)">CARREGAR MAIS</button>
        </div>
    </main>

    <div id="playerModal" class="modal-overlay" style="display: none;">
        <div class="player-card-premium">
            <div class="player-header">
                <div class="header-left">
                    <button class="back-btn-circle" onclick="closePlayer()"><i class="fas fa-arrow-left"></i></button>
                    <div class="title-info">
                        <h3 id="movieTitleDisplay">CARREGANDO...</h3>
                        <span class="streaming-tag">FULL HD</span>
                    </div>
                </div>
                <button id="modalFavBtn" class="fav-btn-premium" onclick="toggleFavorite()"><i class="fas fa-star"></i></button>
            </div>

            <div class="warning-banner">
                <i class="fas fa-circle-exclamation"></i>
                <span>Se o vídeo não carregar, desative o <b>Adblock</b>.</span>
            </div>

            <div class="video-wrapper">
                <div class="ads-notice-premium">FECHE OS ANÚNCIOS PARA LIBERAR O VÍDEO</div>
                <div class="video-container-premium">
                    <iframe 
                        id="videoPlayer" 
                        src="" 
                        frameborder="0" 
                        allowfullscreen 
                        allow="autoplay; encrypted-media; picture-in-picture"
                        referrerpolicy="no-referrer">
                    </iframe>
                </div>
            </div>
            
            <div class="player-footer">
                <p id="movieDescription"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
