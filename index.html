<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script async src="https://pl29054234.profitablecpmratenetwork.com/f3/68/d7/f368d7ccb3a5c2e4f5d6ebdd7f4c3ecc.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="origin-when-cross-origin">
    <title>MoovleTV - Filmes e Séries Online</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="location.reload()">MOOVLE<span>TV</span></div>
        <div class="search-box">
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="O que vamos assistir hoje?" oninput="handleSearchInput(this.value)">
            </div>
            <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
    </header>

    <aside class="sidebar">
        <nav class="nav-menu">
            <div class="nav-item active" onclick="filterType('all', this)"><i class="fas fa-home"></i><span>Início</span></div>
            <div class="nav-item" onclick="filterType('movie', this)"><i class="fas fa-film"></i><span>Filmes</span></div>
            <div class="nav-item" onclick="filterType('tv', this)"><i class="fas fa-tv"></i><span>Séries</span></div>
            <div class="nav-item" onclick="showFavorites(this)"><i class="fas fa-star"></i><span>Favoritos</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="category-pills">
            <button class="pill active" onclick="filterGenre('', this)">Todos</button>
            <button class="pill" onclick="filterGenre('28', this)">Ação</button>
            <button class="pill" onclick="filterGenre('anime', this)">Animes</button> 
            <button class="pill" onclick="filterGenre('10751', this)">Infantil</button>
            <button class="pill" onclick="filterGenre('27', this)">Terror</button>
            <button class="pill" onclick="filterGenre('878', this)">Ficção</button>
        </div>

        <h2 class="section-title">RECOMENDADOS</h2>
        <div id="mainGrid" class="movie-grid"></div>
        
        <div id="loadMoreArea" class="load-more-container">
            <button id="loadMoreBtn" onclick="loadMovies(true)">CARREGAR MAIS</button>
        </div>
    </main>

    <div id="playerModal" class="player-overlay" style="display: none;">
    <div class="premium-modal">
        <div class="modal-top">
            <button class="close-modal" onclick="closePlayer()">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="modal-info">
                <h2 id="movieTitleDisplay">Carregando...</h2>
                <div class="badge-row">
                    <span class="quality-badge">4K ULTRA HD</span>
                    <span class="lang-badge">PT-BR</span>
                </div>
            </div>
            <button id="modalFavBtn" class="action-btn" onclick="toggleFavorite()">
                <i class="far fa-bookmark"></i>
            </button>
        </div>

        <div class="warning-banner">
            <i class="fas fa-circle-exclamation"></i>
            <span>Se o vídeo não carregar ou a conexão for recusada, desative o <b>Adblock</b>.</span>
        </div>

        <div class="main-player-view">
            <div class="iframe-container">
                <div class="player-placeholder">Preparando streaming...</div>
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>
        
        <div class="modal-details">
            <p id="movieDescription"></p>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
